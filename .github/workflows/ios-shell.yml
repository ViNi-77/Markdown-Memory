name: iOS Shell

on:
  pull_request:
    branches:
      - main
    paths:
      - ".github/workflows/ios-shell.yml"
      - "ios/**"
      - "scripts/verify-ios-shell.sh"
      - "docs/SEASON1_PHASE15_CHECK.md"
  push:
    branches:
      - main
    paths:
      - ".github/workflows/ios-shell.yml"
      - "ios/**"
      - "scripts/verify-ios-shell.sh"
      - "docs/SEASON1_PHASE15_CHECK.md"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ios-shell-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: iOS shell build
    runs-on: macos-latest
    timeout-minutes: 20

    steps:
      - name: リポジトリを取得
        uses: actions/checkout@v6

      - name: iOS shell をビルド
        run: scripts/verify-ios-shell.sh
