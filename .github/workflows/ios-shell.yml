name: iOS Shell

on:
  pull_request:
    branches:
      - main
    paths:
      - ".github/workflows/ios-shell.yml"
      - "ios/**"
      - "scripts/verify-ios-shell.sh"
      - "scripts/verify-ios-release-build.sh"
      - "scripts/smoke-ios-shell-simulator.sh"
      - "scripts/check-ios-testflight-prereqs.sh"
      - "docs/SEASON1_PHASE15_CHECK.md"
      - "docs/SEASON1_PHASE16_CHECK.md"
  push:
    branches:
      - main
    paths:
      - ".github/workflows/ios-shell.yml"
      - "ios/**"
      - "scripts/verify-ios-shell.sh"
      - "scripts/verify-ios-release-build.sh"
      - "scripts/smoke-ios-shell-simulator.sh"
      - "scripts/check-ios-testflight-prereqs.sh"
      - "docs/SEASON1_PHASE15_CHECK.md"
      - "docs/SEASON1_PHASE16_CHECK.md"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ios-shell-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: iOS shell build
    runs-on: macos-latest
    timeout-minutes: 20

    steps:
      - name: リポジトリを取得
        uses: actions/checkout@v6

      - name: iOS shell をビルド
        run: scripts/verify-ios-shell.sh

      - name: iOS shell のRelease buildを確認
        run: scripts/verify-ios-release-build.sh

      - name: Simulator で起動確認
        run: scripts/smoke-ios-shell-simulator.sh

      - name: Simulator スクリーンショットを保存
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: ios-shell-simulator-screenshot
          path: ${{ runner.temp }}/markdown-memory-ios-shell.png
          if-no-files-found: ignore
