name: CI

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: 品質ゲート
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: リポジトリを取得
        uses: actions/checkout@v4

      - name: Node.js をセットアップ
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: 依存関係をインストール
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Unit tests
        run: npm test

      - name: Build
        run: npm run build

      - name: Format check
        run: npm run format:check

      - name: 本番依存の脆弱性チェック
        run: npm audit --omit=dev --audit-level=high

      - name: Playwright Chromium をインストール
        run: npx playwright install --with-deps chromium

      - name: E2E tests
        run: npm run test:e2e
