name: PWA 実機確認
description: ホーム画面追加、起動、オフライン導線の実機確認結果を記録する
title: "[PWA実機確認] "
labels:
  - mobile
  - pwa
body:
  - type: markdown
    attributes:
      value: |
        `docs/PWA_REAL_DEVICE_CHECK.md` に沿って、Preview または Production の実機確認結果を記録してください。
        Phase 7の実装済み範囲と実機確認待ちの扱いは `docs/PWA_PHASE7_HANDOFF.md` を確認してください。
        APIキー、個人情報、非公開Markdown本文を含むスクリーンショットやログは貼らないでください。
  - type: dropdown
    id: target
    attributes:
      label: 確認対象
      options:
        - Production
        - Vercel Preview
    validations:
      required: true
  - type: input
    id: url
    attributes:
      label: 確認URL
      placeholder: https://markdown-memory.vercel.app/demo
    validations:
      required: true
  - type: dropdown
    id: device_family
    attributes:
      label: 端末/ブラウザ
      options:
        - iPhone Safari
        - Android Chrome
        - その他
    validations:
      required: true
  - type: input
    id: device
    attributes:
      label: 端末・OSバージョン
      placeholder: 例：iPhone 15 / iOS 18.x
    validations:
      required: true
  - type: checkboxes
    id: install
    attributes:
      label: ホーム画面追加
      options:
        - label: 追加画面でアプリ名が自然に見える
        - label: アイコンが空白、黒塗り、極端な切れ方になっていない
        - label: ホーム画面アイコンから起動できる
        - label: "起動先 `/` が既存のログイン導線またはワークスペースへ進む"
  - type: checkboxes
    id: offline
    attributes:
      label: オフライン導線
      options:
        - label: "オンラインで `/demo` を一度開いた"
        - label: "オフライン時に `/offline` の案内が表示される"
        - label: "`/offline` に「ワークスペースを開く」と「デモを開く」の導線がある"
        - label: "`/offline` に非公開Markdown本文が表示されない"
        - label: "オンライン復帰後に `/demo` へ戻れる"
  - type: dropdown
    id: verdict
    attributes:
      label: 判定
      options:
        - OK
        - 修正が必要
        - 片方の端末だけ確認済み
    validations:
      required: true
  - type: textarea
    id: notes
    attributes:
      label: メモ
      description: 気になった表示、違和感、再現手順があれば書いてください。
  - type: checkboxes
    id: privacy
    attributes:
      label: 公開してよい情報か確認
      options:
        - label: APIキー、DB接続URL、OAuth Secret、個人情報、非公開Markdown本文を含めていません。
          required: true
